<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 to 20 · draw lines (fixed)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #b8dff0;
            font-family: 'Comic Neue', 'Segoe UI', cursive, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .game-box {
            max-width: 1100px;
            width: 100%;
            background: #feebcc;
            border-radius: 70px;
            border: 10px solid #e09d5e;
            box-shadow: 0 20px 0 #b17438;
            padding: 25px 20px 35px;
        }
        .title {
            text-align: center;
            font-size: 3.5rem;
            color: #2d5128;
            text-shadow: 4px 4px 0 #ffd78c;
            margin: 0;
        }
        .sub {
            text-align: center;
            font-size: 1.8rem;
            background: #fff0cc;
            display: inline-block;
            padding: 8px 40px;
            margin: 0 0 20px;
            border-radius: 50px;
            border: 4px solid #bb833f;
        }
        .match-area {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 20px;
            background: #f8dbb0;
            border-radius: 60px;
            padding: 30px 15px;
            border: 5px dashed #b87a40;
            position: relative;
            min-height: 500px;
        }
        /* left numbers column */
        .nums {
            flex: 0 0 150px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: space-around;
            z-index: 5;
        }
        .num-btn {
            background: #ffad60;
            border: 6px solid #b55a1a;
            border-radius: 60px;
            padding: 20px 0;
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            color: #2c2b0f;
            box-shadow: 0 12px 0 #9b4f1a;
            cursor: pointer;
            transition: 0.05s;
            position: relative;
        }
        .num-btn.selected {
            background: #ffe57f;
            border-color: #c88128;
            box-shadow: 0 12px 0 #b3631a, 0 0 0 4px #ffc107;
        }
        .num-btn.matched {
            background: #a5d6a5;
            border-color: #2e7d32;
            box-shadow: 0 12px 0 #1b5e20;
            opacity: 0.9;
            cursor: default;
        }
        .num-btn:active:not(.matched) {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #9b4f1a;
        }

        /* right images column */
        .imgs {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: space-around;
            z-index: 5;
        }
        .img-card {
            background: #c7e3c7;
            border: 6px solid #2f7d4d;
            border-radius: 60px;
            padding: 15px 5px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 12px;
            box-shadow: 0 12px 0 #236b3a;
            cursor: pointer;
            transition: 0.05s;
        }
        .img-card.matched {
            background: #a5d6a5;
            border-color: #2e7d32;
            box-shadow: 0 12px 0 #1b5e20;
            opacity: 0.9;
        }
        .img-card:active:not(.matched) {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #236b3a;
        }
        .smiley {
            width: 35px;
            height: 35px;
            background: #ffdb7c;
            border-radius: 50%;
            border: 3px solid #b3761a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #7b4a1e;
        }
        .smiley::after {
            content: "☻";
        }

        /* canvas for lines - positioned absolutely over the match area */
        .line-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #lineCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 25px 0 15px;
            flex-wrap: wrap;
        }
        .btn {
            background: #ffb252;
            border: none;
            border-radius: 50px;
            font-size: 2rem;
            padding: 12px 35px;
            font-weight: bold;
            border-bottom: 8px solid #9b632e;
            cursor: pointer;
            transition: 0.05s;
        }
        .btn:active {
            transform: translateY(6px);
            border-bottom-width: 3px;
        }
        .message {
            text-align: center;
            font-size: 2rem;
            background: #fff4cf;
            border-radius: 60px;
            padding: 15px 25px;
            border: 5px solid #cb9a5b;
            min-height: 4rem;
        }
        .weather {
            text-align: right;
            color: #6b5a3a;
            font-size: 1.2rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="game-box">
    <div class="title">16 · 17 · 18 · 19 · 20</div>
    <div class="sub">✏️ draw a line to match number & group</div>

    <div class="match-area" id="matchArea">
        <!-- left numbers -->
        <div class="nums" id="numbersColumn">
            <div class="num-btn" data-num="16">16</div>
            <div class="num-btn" data-num="17">17</div>
            <div class="num-btn" data-num="18">18</div>
            <div class="num-btn" data-num="19">19</div>
            <div class="num-btn" data-num="20">20</div>
        </div>

        <!-- right images (will be populated by js) -->
        <div class="imgs" id="imagesColumn"></div>

        <!-- canvas overlay for drawing lines -->
        <div class="line-canvas-container">
            <canvas id="lineCanvas"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="undoBtn">↩️ undo last</button>
        <button class="btn" id="clearAllBtn">🔄 start over (clear all)</button>
    </div>

    <div class="message" id="message">👆 tap a number, then tap its matching group</div>
    <div class="weather">31°C · Partly sunny ⛅</div>
</div>

<script>
(function() {
    const numbers = [16, 17, 18, 19, 20];
    
    // DOM elements
    const numbersColumn = document.getElementById('numbersColumn');
    const imagesColumn = document.getElementById('imagesColumn');
    const canvas = document.getElementById('lineCanvas');
    const ctx = canvas.getContext('2d');
    const messageEl = document.getElementById('message');
    const undoBtn = document.getElementById('undoBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const matchArea = document.getElementById('matchArea');

    // State
    let selectedNum = null;
    let matches = {};              // {16: true, 17: true, ...}
    let lines = [];                 // array of {fromX, fromY, toX, toY, num}
    
    // Store element references
    let numberButtons = [];
    let imageCards = [];

    // Initialize right side with shuffled images
    function initImages() {
        imagesColumn.innerHTML = '';
        const shuffled = [...numbers].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(num => {
            const card = document.createElement('div');
            card.className = 'img-card';
            card.dataset.num = num;
            
            // Add smiley faces (num times)
            for (let i = 0; i < num; i++) {
                const smiley = document.createElement('span');
                smiley.className = 'smiley';
                card.appendChild(smiley);
            }
            
            imagesColumn.appendChild(card);
        });
        
        // Update image cards reference
        imageCards = Array.from(document.querySelectorAll('.img-card'));
    }

    // Update canvas size and redraw all lines
    function redrawLines() {
        const rect = matchArea.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw all matched lines
        lines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.fromX, line.fromY);
            ctx.lineTo(line.toX, line.toY);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#2e7d32';
            ctx.shadowColor = '#1b5e20';
            ctx.shadowBlur = 6;
            ctx.stroke();
        });
        
        ctx.shadowBlur = 0;
    }

    // Get center coordinates of an element relative to matchArea
    function getElementCenter(el) {
        const areaRect = matchArea.getBoundingClientRect();
        const elRect = el.getBoundingClientRect();
        
        return {
            x: elRect.left + elRect.width / 2 - areaRect.left,
            y: elRect.top + elRect.height / 2 - areaRect.top
        };
    }

    // Add a line between number and image
    function addLine(num, fromEl, toEl) {
        const fromPos = getElementCenter(fromEl);
        const toPos = getElementCenter(toEl);
        
        lines.push({
            fromX: fromPos.x,
            fromY: fromPos.y,
            toX: toPos.x,
            toY: toPos.y,
            num: num
        });
        
        redrawLines();
    }

    // Remove last line
    function undoLast() {
        if (lines.length === 0) return false;
        
        const last = lines.pop();
        delete matches[last.num];
        
        // Update classes
        const numBtn = document.querySelector(`.num-btn[data-num="${last.num}"]`);
        const imgCard = document.querySelector(`.img-card[data-num="${last.num}"]`);
        
        if (numBtn) numBtn.classList.remove('matched', 'selected');
        if (imgCard) imgCard.classList.remove('matched');
        
        redrawLines();
        return true;
    }

    // Reset everything
    function resetAll() {
        selectedNum = null;
        matches = {};
        lines = [];
        
        // Remove all matched/selected classes
        document.querySelectorAll('.num-btn').forEach(btn => {
            btn.classList.remove('matched', 'selected');
        });
        document.querySelectorAll('.img-card').forEach(card => {
            card.classList.remove('matched');
        });
        
        // Reshuffle images
        initImages();
        redrawLines();
        messageEl.innerHTML = '👆 tap a number, then tap its matching group';
    }

    // Check if all numbers are matched
    function allMatched() {
        return numbers.every(n => matches[n] === true);
    }

    // Event: number click
    numbersColumn.addEventListener('click', (e) => {
        const btn = e.target.closest('.num-btn');
        if (!btn) return;
        
        const num = parseInt(btn.dataset.num);
        
        if (matches[num]) {
            messageEl.innerHTML = `✅ ${num} is already matched!`;
            return;
        }
        
        // Remove selected class from all
        numberButtons.forEach(b => b.classList.remove('selected'));
        
        // Set new selected
        btn.classList.add('selected');
        selectedNum = num;
        messageEl.innerHTML = `✏️ selected ${num} — now tap the group with ${num} faces`;
    });

    // Event: image card click
    imagesColumn.addEventListener('click', (e) => {
        const card = e.target.closest('.img-card');
        if (!card) return;
        
        const qty = parseInt(card.dataset.num);
        
        if (matches[qty]) {
            messageEl.innerHTML = `🌟 ${qty} is already matched!`;
            return;
        }
        
        if (selectedNum === null) {
            messageEl.innerHTML = '👆 first tap a number on the left!';
            return;
        }
        
        if (matches[selectedNum]) {
            selectedNum = null;
            numberButtons.forEach(b => b.classList.remove('selected'));
            messageEl.innerHTML = '👆 tap a number again';
            return;
        }
        
        // Check if match
        if (qty === selectedNum) {
            // Find elements
            const numBtn = document.querySelector(`.num-btn[data-num="${selectedNum}"]`);
            const imgCard = document.querySelector(`.img-card[data-num="${selectedNum}"]`);
            
            if (numBtn && imgCard) {
                // Add line
                addLine(selectedNum, numBtn, imgCard);
                
                // Mark as matched
                matches[selectedNum] = true;
                numBtn.classList.add('matched');
                numBtn.classList.remove('selected');
                imgCard.classList.add('matched');
                
                if (allMatched()) {
                    messageEl.innerHTML = '🎉 PERFECT! 16 to 20 all matched! 🎉';
                } else {
                    messageEl.innerHTML = '✔️ matched! pick another number';
                }
                
                selectedNum = null;
            }
        } else {
            messageEl.innerHTML = `❌ ${selectedNum} doesn't match ${qty} — try again`;
        }
    });

    // Undo button
    undoBtn.addEventListener('click', () => {
        if (undoLast()) {
            messageEl.innerHTML = '↩️ last match undone';
        } else {
            messageEl.innerHTML = 'nothing to undo';
        }
    });

    // Clear all button
    clearAllBtn.addEventListener('click', resetAll);

    // Handle window resize
    window.addEventListener('resize', () => {
        if (lines.length > 0) {
            // Recalculate line positions
            const newLines = [];
            lines.forEach(line => {
                const numBtn = document.querySelector(`.num-btn[data-num="${line.num}"]`);
                const imgCard = document.querySelector(`.img-card[data-num="${line.num}"]`);
                
                if (numBtn && imgCard && matches[line.num]) {
                    const fromPos = getElementCenter(numBtn);
                    const toPos = getElementCenter(imgCard);
                    newLines.push({
                        fromX: fromPos.x,
                        fromY: fromPos.y,
                        toX: toPos.x,
                        toY: toPos.y,
                        num: line.num
                    });
                }
            });
            lines = newLines;
        }
        redrawLines();
    });

    // Initial setup
    numberButtons = Array.from(document.querySelectorAll('.num-btn'));
    initImages();
    
    // Set canvas size initially
    setTimeout(() => {
        const rect = matchArea.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }, 50);
})();
</script>
