<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alphabet Express</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #b6d8e3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            padding: 10px;
        }

        .game-box {
            max-width: 800px;
            width: 100%;
            background: #fcf3cf;
            border-radius: 40px;
            border: 8px solid #f7b773;
            box-shadow: 0 12px 0 #cc9146;
            padding: 20px;
        }

        /* Top Bar */
        .train-header {
            background: #fedd9e;
            border-radius: 25px;
            padding: 10px 20px;
            margin-bottom: 15px;
            border: 5px solid #ce964b;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .level-indicator {
            background: #bee0b9;
            border-radius: 15px;
            padding: 5px 15px;
            font-size: 1.2rem;
            border: 3px solid #57944e;
            font-weight: bold;
        }

        /* Message Area */
        .engine {
            background: #ffd58c;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 15px;
            border: 4px solid #c1863d;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* THE TRACK (Where cars appear) */
        .track {
            background: #b8d198;
            border-radius: 30px;
            padding: 20px 10px;
            border: 5px solid #789b4b;
            margin-bottom: 15px;
            min-height: 120px; /* Prevents jumping */
        }

        .train-cars {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .car-slot {
            background: #ffc88a;
            flex: 1;
            max-width: 90px;
            height: 110px;
            border-radius: 20px 20px 10px 10px;
            border: 4px solid #ad6e35;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #7b4f26;
        }

        .letter-place {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c1809;
        }

        /* THE STATION (Where choices appear) */
        .station {
            background: #cfdbea;
            border-radius: 30px;
            padding: 20px;
            border: 5px solid #6482a3;
            margin-bottom: 15px;
            min-height: 100px;
        }

        .letters-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .letter-card {
            background: #ffdbb5;
            width: 70px;
            height: 90px;
            border-radius: 20px;
            border: 4px solid #ea9549;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #b15f2a;
            font-size: 2.8rem;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .letter-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b15f2a;
        }

        .disabled-letter {
            opacity: 0.2;
            pointer-events: none;
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Next Button */
        .next-choo-btn {
            width: 100%;
            background: #fdd06b;
            border: 6px solid #cc8b3c;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 0 #9e632b;
            margin-bottom: 15px;
        }

        .next-choo-btn:disabled {
            opacity: 0.5;
            box-shadow: none;
            transform: translateY(4px);
        }

        @media (min-width: 600px) {
            .car-slot { height: 140px; max-width: 110px; }
            .letter-place { font-size: 4rem; }
            .letter-card { width: 100px; height: 120px; font-size: 4rem; }
        }
    </style>
</head>
<body>

<div class="game-box">
    <div class="train-header">
        <h2 style="font-size: 1.5rem;">❤️ KAYA MO YAN!</h2>
        <div class="level-indicator" id="levelDisplay">....</div>
    </div>

    <div class="engine" id="engineMessage">Loading...</div>

    <div class="track">
        <div class="train-cars" id="trainCarsContainer"></div>
    </div>

    <div class="station">
        <div class="letters-grid" id="lettersGrid"></div>
    </div>

    <div class="engine" style="background:#ead2aa;" id="feedbackText">Ready?</div>

    <button class="next-choo-btn" id="nextTrainBtn" disabled>NEXT ➔</button>
    
    <div style="text-align: center;">
        <span onclick="location.reload()" style="cursor:pointer; text-decoration: underline; color: #9e602b; font-weight: bold;">🔄 Reset Game</span>
    </div>
</div>

<script>
    // This ensures the game only starts once the HTML is fully ready
    window.onload = function() {
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let currentSequence = [];
        let userSequence = [];
        let currentStepIndex = 0;

        const trainContainer = document.getElementById('trainCarsContainer');
        const lettersGrid = document.getElementById('lettersGrid');
        const engineMsg = document.getElementById('engineMessage');
        const feedback = document.getElementById('feedbackText');
        const levelDisp = document.getElementById('levelDisplay');
        const nextBtn = document.getElementById('nextTrainBtn');

        function startNewRound() {
            const startIdx = Math.floor(Math.random() * (alphabet.length - 4));
            currentSequence = alphabet.slice(startIdx, startIdx + 4);
            userSequence = [];
            currentStepIndex = 0;
            
            nextBtn.disabled = true;
            levelDisp.innerText = currentSequence.join(" ");
            engineMsg.innerText = "Pagsunod-sunurin ang mga letra!";
            feedback.innerText = "Pumili ng mga letra.";
            
            render();
        }

        function render() {
            // Render Slots
            trainContainer.innerHTML = "";
            for(let i=0; i<4; i++) {
                const char = userSequence[i] || "";
                trainContainer.innerHTML += `
                    <div class="car-slot">
                        <div style="font-size: 0.8rem; margin-bottom: 5px;">😊 ${i+1}</div>
                        <div class="letter-place">${char}</div>
                    </div>`;
            }

            // Render Choices (Shuffled)
            // We only shuffle once at the start of the round
            if (userSequence.length === 0) {
                const shuffled = [...currentSequence].sort(() => Math.random() - 0.5);
                lettersGrid.innerHTML = "";
                shuffled.forEach(letter => {
                    const btn = document.createElement('div');
                    btn.className = 'letter-card';
                    btn.innerText = letter;
                    btn.onclick = () => handlePick(letter, btn);
                    lettersGrid.appendChild(btn);
                });
            }
        }

        function handlePick(letter, element) {
            const expected = currentSequence[currentStepIndex];

            if (letter === expected) {
                userSequence.push(letter);
                currentStepIndex++;
                element.classList.add('disabled-letter');
                feedback.innerText = "Good job! ✅";
                
                if (currentStepIndex === 4) {
                    feedback.innerText = "Mahusay! 🏆";
                    engineMsg.innerText = "Magaling! Binabati kita";
                    nextBtn.disabled = false;
                }
                render(); 
            } else {
                feedback.innerText = "Hindi yan! Subukan mo ang " + expected + " 🤔";
            }
        }

        nextBtn.onclick = startNewRound;
        startNewRound();
    };
</script>
