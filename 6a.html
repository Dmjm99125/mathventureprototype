<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindergarten math · match numbers & quantities</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* prevent accidental text selection while tapping */
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9eec1 0%, #fff2d9 100%);
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #ffeacb;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 8px 0 #d4a373 inset, 0 -8px 0 #d4a373 inset;
            padding: 30px 20px 40px 20px;
            border: 6px solid #b57c4a;
        }

        h1 {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            font-weight: 500;
            color: #5e3a1c;
            text-shadow: 3px 3px 0 #f7d59a;
            letter-spacing: 2px;
            word-break: break-word;
        }

        .subtitle {
            text-align: center;
            font-size: 1.3rem;
            color: #7b4b2a;
            background: #feeac2;
            display: inline-block;
            padding: 8px 35px;
            margin: 0 auto 30px auto;
            border-radius: 50px;
            border: 3px solid #b68b5c;
            box-shadow: inset 0 2px 5px #fff3d1;
        }

        .matching-board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            background: #fbe2b1;
            border-radius: 70px;
            padding: 40px 20px;
            border: 5px dashed #c29a6b;
            box-shadow: inset 0 0 0 8px #fef7d5;
        }

        /* left & right panels */
        .panel {
            flex: 1 1 280px;
            min-width: 260px;
            background: #fcf2dd;
            border-radius: 50px;
            padding: 25px 15px;
            box-shadow: 0 8px 0 #b48754, 0 12px 18px -8px #ad7a4b;
            border: 3px solid #fadbad;
        }

        .panel h2 {
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
            color: #442f18;
            font-size: 2rem;
            background: #ffe3b7;
            border-radius: 40px;
            padding: 5px 10px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            border: 3px solid #b48754;
        }

        /* number boxes (left) */
        .numbers-area {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: stretch;
        }

        .number-card {
            background: #f4cda6;
            border: 5px solid #a5663a;
            border-radius: 70px;
            padding: 15px 10px;
            text-align: center;
            font-size: 4.5rem;
            font-weight: bold;
            color: #3f280e;
            line-height: 1;
            box-shadow: 0 7px 0 #8b572a, 0 10px 12px rgba(0,0,0,0.2);
            transition: 0.05s linear;
            cursor: pointer;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #fad79b;
        }

        /* active / highlight effect when matching? – just for fun, optional */
        .number-card:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #8b572a, 0 7px 10px rgba(0,0,0,0.15);
        }

        /* quantity cards (right) */
        .quantity-area {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .quantity-card {
            background: #b6d8b6;
            border: 5px solid #3f7940;
            border-radius: 60px;
            padding: 18px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 7px 0 #256125, 0 10px 12px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.05s linear;
        }

        .quantity-card:active {
            transform: translateY(4px);
            box-shadow: 0 3px 0 #256125, 0 7px 10px rgba(0,0,0,0.1);
        }

        /* dots/images - using pure css circles with numbers */
        .dot-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 18px;
            padding: 5px 10px;
        }

        .dot-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dot {
            width: 45px;
            height: 45px;
            background: #f55c5c;
            border-radius: 50%;
            box-shadow: 0 5px 0 #942828, 0 6px 10px #6b4040;
            border: 2px solid #fff9e3;
            transition: 0.1s;
        }

        /* for larger numbers we keep the same dot size – still fine */
        .q-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 20px;
        }

        /* matching message / feedback */
        .message-area {
            text-align: center;
            margin: 30px 0 5px;
            font-size: 2rem;
            background: #d9b382;
            border-radius: 50px;
            padding: 15px 20px;
            border: 5px solid #ad6d3d;
            color: #291e10;
            font-weight: 600;
            min-height: 5rem;
            box-shadow: inset 0 2px 8px #ffefcb;
        }

        .reset-button {
            background: #ffb156;
            border: none;
            border-radius: 40px;
            font-size: 2rem;
            padding: 10px 35px;
            font-weight: bold;
            color: #362812;
            border-bottom: 8px solid #9f6633;
            cursor: pointer;
            transition: 0.07s;
            box-shadow: 0 7px 0 #a06730;
            margin-top: 10px;
            font-family: inherit;
        }

        .reset-button:active {
            transform: translateY(5px);
            border-bottom-width: 3px;
            box-shadow: 0 2px 0 #a06730;
        }

        .footer {
            display: flex;
            justify-content: center;
        }

        /* pairing highlight (optional visual when matched – we use green outline) */
        .matched-number {
            background: #c8e6b5;
            border-color: #1f7a1f;
            opacity: 0.9;
            box-shadow: 0 7px 0 #175217, 0 10px 12px rgba(0,0,0,0.2);
            transition: 0.2s;
            border-width: 6px;
        }

        .matched-quantity {
            background: #b3e0b3;
            border-color: #1f7a1f;
            border-width: 6px;
            box-shadow: 0 7px 0 #175217;
        }

        /* simple responsiveness */
        @media (max-width: 650px) {
            .game-container { padding: 15px; }
            .number-card { font-size: 3rem; }
            .dot { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐻 1 2 3  ·  count & match  🐝</h1>
        <div style="text-align: center;"><span class="subtitle">tap a number → then tap its dot friends</span></div>

        <div class="matching-board">
            <!-- LEFT SIDE: NUMBERS -->
            <div class="panel">
                <h2>🔢 numbers</h2>
                <div class="numbers-area" id="numbersPanel">
                    <!-- dynamically filled by js, but we will also keep static fallback – better generate with js for pairing  -->
                </div>
            </div>

            <!-- RIGHT SIDE: QUANTITIES (images of dots) -->
            <div class="panel">
                <h2>🔴 quantities</h2>
                <div class="quantity-area" id="quantityPanel">
                    <!-- dynamic dot cards -->
                </div>
            </div>
        </div>

        <!-- message & reset -->
        <div class="message-area" id="messageDisplay">
            👋 tap a number, then a group of dots!
        </div>
        <div class="footer">
            <button class="reset-button" id="resetGameBtn">🔄 new round</button>
        </div>
    </div>

    <script>
        (function() {
            // we want numbers 1 through 5 for kindergarten (can be changed)
            const NUMBER_VALUES = [1, 2, 3, 4, 5];

            // DOM elements
            const numbersDiv = document.getElementById('numbersPanel');
            const quantityDiv = document.getElementById('quantityPanel');
            const messageEl = document.getElementById('messageDisplay');
            const resetBtn = document.getElementById('resetGameBtn');

            // state
            let selectedNumber = null;              // store the number value (1-5) currently selected
            let matches = {};                        // e.g. { 1: true, 3: true } for numbers that are already matched
            let quantityElementsMap = new Map();     // key: number (1..5) -> quantity card DOM
            let numberElementsMap = new Map();        // key: number -> number card DOM

            // Helper: create a card with dots (quantity representation)
            function createQuantityCard(num) {
                const card = document.createElement('div');
                card.className = 'quantity-card';
                card.dataset.quantity = num;   // store which number this card belongs to

                const dotGroup = document.createElement('div');
                dotGroup.className = 'dot-group';

                // create "num" dots (as CSS circles, but they are like image representations)
                for (let i = 0; i < num; i++) {
                    const dotWrapper = document.createElement('div');
                    dotWrapper.className = 'dot-item';
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    // you could replace .dot with an img tag if you prefer real images.
                    // for now we keep pure CSS circles, but they look like friendly dots.
                    // if you want actual images, you can replace the line above with:
                    // <img src="dot.png" width="40" height="40"> but we stick to css (simple and vector)
                    dotWrapper.appendChild(dot);
                    dotGroup.appendChild(dotWrapper);
                }

                // optional extra visual: tiny number hint (not needed but friendly)
                const hiddenHint = document.createElement('div');
                hiddenHint.style.opacity = '0.4';
                hiddenHint.style.fontSize = '0.9rem';
                hiddenHint.style.marginTop = '5px';
                hiddenHint.textContent = '⚫'.repeat(num);  // just for fun

                card.appendChild(dotGroup);
                card.appendChild(hiddenHint);
                return card;
            }

            // Helper: create a number card (left side)
            function createNumberCard(num) {
                const card = document.createElement('div');
                card.className = 'number-card';
                card.dataset.number = num;
                card.textContent = num;
                return card;
            }

            // Render entire board based on current matches
            function renderGame() {
                // Clear containers
                numbersDiv.innerHTML = '';
                quantityDiv.innerHTML = '';
                quantityElementsMap.clear();
                numberElementsMap.clear();

                // Shuffle or keep order? Let's keep numbers in order 1..5 (left)
                // For right side we could randomize to make it more interesting, but we'll keep sorted for clarity
                const sortedNumbers = [...NUMBER_VALUES].sort((a,b) => a - b);
                // Right side we also display in same order, but we can optionally shuffle:
                const shuffledForRight = [...NUMBER_VALUES].sort(() => Math.random() - 0.5); // mixed order
                // But to avoid confusion, let's randomize a bit? kindergarten might be easier in order? 
                // we will randomize the right side so they need to match, but left remains sorted. Good challenge.
                // Actually matching becomes more fun if right side is shuffled.
                const rightQuantities = [...NUMBER_VALUES].sort(() => Math.random() - 0.5);

                // Create number cards (left)
                for (let num of sortedNumbers) {
                    const card = createNumberCard(num);
                    if (matches[num]) {
                        card.classList.add('matched-number');
                    }
                    numbersDiv.appendChild(card);
                    numberElementsMap.set(num, card);
                }

                // Create quantity cards (right) in shuffled order
                for (let num of rightQuantities) {
                    const qCard = createQuantityCard(num);
                    qCard.dataset.quantity = num;
                    if (matches[num]) {
                        qCard.classList.add('matched-quantity');
                    }
                    quantityDiv.appendChild(qCard);
                    quantityElementsMap.set(num, qCard);
                }

                // reset selected number highlight? we don't have persistent highlight, but we can clear selected
                selectedNumber = null;
                // update message if all matched
                updateMessage();
            }

            // check if game completed
            function checkAllMatched() {
                return NUMBER_VALUES.every(num => matches[num] === true);
            }

            // update message based on state
            function updateMessage() {
                if (checkAllMatched()) {
                    messageEl.innerHTML = '🎉✨ PERFECT! EVERY NUMBER MATCHED! ✨🎉';
                } else if (selectedNumber !== null) {
                    messageEl.innerHTML = `🔍 selected number ${selectedNumber} — now tap the group with ${selectedNumber} dots`;
                } else {
                    messageEl.innerHTML = '👆 tap a number, then tap a group of dots!';
                }
            }

            // clear any leftover selected visual (we dont keep visual, just state)
            function clearSelectedVisual() {
                // optional: we could remove a 'selected' class, but we are not using it to keep simple
            }

            // event handling: because cards are recreated we use event delegation on the panels
            numbersDiv.addEventListener('click', (e) => {
                // find if the clicked element is a number card or inside it
                const numberCard = e.target.closest('.number-card');
                if (!numberCard) return;

                const numValue = parseInt(numberCard.dataset.number);
                // if already matched, disallow selection? maybe we can allow but show warning?
                if (matches[numValue]) {
                    messageEl.innerHTML = `✅ number ${numValue} is already matched! great job.`;
                    return;
                }

                // set selected number
                selectedNumber = numValue;
                updateMessage();
            });

            quantityDiv.addEventListener('click', (e) => {
                const quantityCard = e.target.closest('.quantity-card');
                if (!quantityCard) return;

                const qValue = parseInt(quantityCard.dataset.quantity);

                // case: quantity already matched
                if (matches[qValue]) {
                    messageEl.innerHTML = `🌈 the ${qValue} dots are already paired!`;
                    return;
                }

                // if no selected number, remind them
                if (selectedNumber === null) {
                    messageEl.innerHTML = '🙋 first tap a number on the left!';
                    return;
                }

                // if selected number is already matched (shouldn't happen due to earlier guard, but double-check)
                if (matches[selectedNumber]) {
                    // but we prevented selecting matched numbers, but just in case
                    selectedNumber = null;
                    updateMessage();
                    return;
                }

                // now check: does the quantity match the selected number?
                if (qValue === selectedNumber) {
                    // MATCH!
                    matches[selectedNumber] = true;

                    // update styles
                    const numCard = numberElementsMap.get(selectedNumber);
                    const qCard = quantityElementsMap.get(selectedNumber); // careful: qCard is by value, we need the card with that number
                    // but we must ensure we get the card that actually has this number (the one we clicked is correct)
                    // quantityElementsMap holds each card by its number value (since numbers unique). So we can use that.
                    const matchedQCard = quantityElementsMap.get(selectedNumber);
                    if (numCard) numCard.classList.add('matched-number');
                    if (matchedQCard) matchedQCard.classList.add('matched-quantity');

                    messageEl.innerHTML = `✔️ correct! ${selectedNumber} = ${selectedNumber} dots 🎈`;
                    selectedNumber = null; // reset selection

                    // Check if game finished
                    if (checkAllMatched()) {
                        messageEl.innerHTML = '🎉✨ ALL MATCHED! YOU DID IT! ✨🎉';
                    } else {
                        updateMessage(); // show default
                    }
                } else {
                    // wrong match
                    messageEl.innerHTML = `❌ oops! you tapped ${qValue} dots, but selected number is ${selectedNumber}. try again!`;
                    // keep selectedNumber unchanged? probably they should try correct one.
                    // We could keep selection active – user might want to try another group. yes keep.
                }
            });

            // reset game
            function resetGame() {
                matches = {};
                selectedNumber = null;
                // re-render with fresh random order on right side
                renderGame();
                messageEl.innerHTML = '👋 fresh start! tap a number, then a group!';
            }

            resetBtn.addEventListener('click', resetGame);

            // initial render
            renderGame();

            // optional: also handle tap outside? not needed
        })();
    </script>

    <!-- extra description: you can replace dots with any image by swapping .dot style or using <img> -->
    <!-- to use actual images instead of css circles: inside createQuantityCard, replace dot div with <img src="circle.png" width="40"> -->
</body>
